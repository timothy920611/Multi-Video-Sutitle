<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JW 字幕提取器 (純淨完整版)</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jsPDF 向量 PDF 生成庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar */
        textarea::-webkit-scrollbar, div::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track, div::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb, div::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
        textarea::-webkit-scrollbar-thumb:hover, div::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: content-box; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .progress-bar-striped {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
        }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }
        .animate-stripes { animation: progress-stripes 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const Icons = {
            ShieldCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Loader2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            Play: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="6 3 20 12 6 21 6 3"/></svg>,
            FileText: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
            Check: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>,
            Clipboard: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>,
            ArrowLeft: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            List: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Download: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Code: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
            AlertCircle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        };

        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        const App = () => {
            const [appState, setAppState] = React.useState('input'); 
            const [inputText, setInputText] = React.useState('');
            const [results, setResults] = React.useState([]); 
            const [progress, setProgress] = React.useState({ current: 0, total: 0, success: 0, failed: 0 });
            
            const [copyState, setCopyState] = React.useState(false);
            const [isGeneratingPdf, setIsGeneratingPdf] = React.useState(false);
            const [pdfError, setPdfError] = React.useState(null);

            const parseUrlInfo = (inputUrl) => {
                try {
                    const info = { id: null, lang: 'CH' };
                    const u = new URL(inputUrl.startsWith('http') ? inputUrl : `https://${inputUrl}`);
                    if (u.searchParams.get('lank')) info.id = u.searchParams.get('lank');
                    if (u.searchParams.get('wtlocale')) info.lang = u.searchParams.get('wtlocale');
                    if (!info.id) {
                        const match = inputUrl.match(/(pub-[a-zA-Z0-9-_]+)/i);
                        if (match) info.id = match[1];
                    }
                    return info;
                } catch (e) { return { id: null, lang: 'CH' }; }
            };

            const cleanVttText = (vttContent) => {
                if (!vttContent) return '';
                const txt = document.createElement("textarea");
                const decode = (str) => { txt.innerHTML = str; return txt.value; };
                const lines = vttContent.split('\n');
                let resultLines = [];
                let currentTimestamp = '';
                
                for (let i = 0; i < lines.length; i++) {
                    let text = lines[i].trim();
                    if (!text || text.startsWith('WEBVTT') || text.startsWith('NOTE') || text.startsWith('STYLE') || /^\d+$/.test(text)) continue; 
                    if (text.includes('-->')) {
                        const timeMatch = text.match(/^(\d{2}:\d{2}:\d{2})/);
                        currentTimestamp = timeMatch ? `[${timeMatch[1]}] ` : '';
                        continue;
                    }
                    text = text.replace(/<\/?[^>]+(>|$)/g, "");
                    resultLines.push(`${currentTimestamp}${decode(text)}`);
                }
                return resultLines.join('\n');
            };

            const fetchWithRetry = async (targetUrl) => {
                try {
                    const directRes = await fetch(targetUrl);
                    if (directRes.ok) return directRes;
                } catch (e) {}
                for (let proxy of PROXIES) {
                    try {
                        const res = await fetch(proxy + encodeURIComponent(targetUrl));
                        if (res.ok) return res;
                    } catch (e) { continue; }
                }
                throw new Error('無法連線');
            };

            const handleStartBatch = async () => {
                const lines = inputText.split('\n').map(l => l.trim()).filter(l => l !== '');
                if (lines.length === 0) return;
                
                const urlsToProcess = lines.slice(0, 50);
                const initialResults = urlsToProcess.map(url => ({ url, status: 'pending', id: parseUrlInfo(url).id || '未知ID' }));
                setResults(initialResults);
                setProgress({ current: 0, total: urlsToProcess.length, success: 0, failed: 0 });
                setAppState('processing');

                let currentResults = [...initialResults];
                let successCount = 0; let failedCount = 0;

                for (let i = 0; i < urlsToProcess.length; i++) {
                    const url = urlsToProcess[i];
                    let itemResult = { ...currentResults[i] };
                    try {
                        const { id, lang } = parseUrlInfo(url);
                        if (!id) throw new Error('無法識別影片 ID');
                        itemResult.id = id;

                        const apiUrl = `https://b.jw-cdn.org/apis/mediator/v1/media-items/${lang}/${id}?clientType=www`;
                        const resJSON = await fetchWithRetry(apiUrl);
                        const data = await resJSON.json();
                        const files = data.media?.[0]?.files || [];
                        itemResult.title = data.media?.[0]?.title || id;
                        
                        const subFile = files.find(f => f.label === 'subtitles' || f.subtitles?.url);
                        if (!subFile) throw new Error('此影片無字幕檔');

                        const resVTT = await fetchWithRetry(subFile.subtitles?.url || subFile.url);
                        itemResult.text = cleanVttText(await resVTT.text());
                        itemResult.status = 'success';
                        successCount++;
                    } catch (err) {
                        itemResult.status = 'error'; itemResult.errorMsg = err.message; failedCount++;
                    }

                    currentResults[i] = itemResult;
                    setResults([...currentResults]);
                    setProgress({ current: i + 1, total: urlsToProcess.length, success: successCount, failed: failedCount });
                }
                setAppState('result');
            };

            const getCombinedText = () => {
                const successfulItems = results.filter(r => r.status === 'success');
                if (successfulItems.length === 0) return '沒有成功提取的字幕。';
                return successfulItems.map((item, index) => `=========================================\n影片 ${index + 1}: ${item.title || item.id}\n=========================================\n\n${item.text}\n\n`).join('');
            };

            const copyResult = () => {
                const text = getCombinedText();
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyState(true);
                setTimeout(() => setCopyState(false), 2000);
            };

            const downloadTxt = () => {
                const content = `JW 字幕批次提取報告\n\n${getCombinedText()}`;
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `JW字幕批次提取_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const downloadHtml = () => {
                const successfulItems = results.filter(r => r.status === 'success');
                let htmlContent = `
                <!DOCTYPE html>
                <html lang="zh-TW">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>JW 字幕批次提取報告</title>
                    <style>
                        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f8f9fa; }
                        h1 { color: #1e293b; text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 30px;}
                        .toc { background: white; border-radius: 12px; padding: 20px 25px; margin-bottom: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0;}
                        .toc h2 { color: #0f172a; margin-top: 0; font-size: 1.25rem; }
                        .toc ul { list-style-type: decimal; padding-left: 20px; margin-bottom: 0;}
                        .toc li { margin-bottom: 10px; }
                        .toc a { color: #0ea5e9; text-decoration: none; font-weight: 500;}
                        .toc a:hover { text-decoration: underline; color: #0284c7; }
                        .video-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; scroll-margin-top: 20px;}
                        .video-title { color: #10b981; margin-top: 0; font-size: 1.35rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 15px;}
                        pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: 1rem; color: #475569; margin: 0; }
                    </style>
                </head>
                <body>
                    <h1>JW 字幕批次提取報告</h1>
                    <div class="toc">
                        <h2>影片目錄 (${successfulItems.length} 部影片)</h2>
                        <ul>
                            ${successfulItems.map((item, idx) => `<li><a href="#video-${idx}">${item.title}</a></li>`).join('')}
                        </ul>
                    </div>
                    ${successfulItems.map((item, idx) => `
                        <div class="video-card" id="video-${idx}">
                            <h2 class="video-title">影片 ${idx + 1}: ${item.title}</h2>
                            <pre>${item.text}</pre>
                        </div>
                    `).join('')}
                </body>
                </html>
                `;
                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `JW字幕批次提取_${new Date().toISOString().slice(0,10)}.html`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            // 修正：向量 PDF 生成邏輯
            const generateVectorPdf = async () => {
                setIsGeneratingPdf(true);
                setPdfError(null);
                
                // 稍微延遲讓 React 有時間渲染「載入中」遮罩畫面
                await new Promise(resolve => setTimeout(resolve, 100));

                try {
                    const { jsPDF } = window.jspdf;
                    if (!jsPDF) throw new Error("PDF 引擎尚未載入完成。");

                    const doc = new jsPDF('p', 'mm', 'a4');

                    // 載入繁體中文字型 (Open Huninn)
                    const fontUrl = 'https://cdn.jsdelivr.net/npm/open-huninn-font@1.1.0/font/jf-openhuninn-1.1/jf-openhuninn-1.1.ttf';
                    const fontRes = await fetch(fontUrl);
                    if (!fontRes.ok) throw new Error("無法從網路載入中文字型檔案。");
                    
                    const blob = await fontRes.blob();
                    
                    // 修正：使用 FileReader 非同步轉換 Base64，解決原本轉換迴圈導致瀏覽器卡死的問題
                    const fontBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const result = reader.result;
                            const base64 = result.split(',')[1];
                            resolve(base64);
                        };
                        reader.onerror = () => reject(new Error("字型格式轉換失敗"));
                        reader.readAsDataURL(blob);
                    });

                    doc.addFileToVFS('OpenHuninn.ttf', fontBase64);
                    doc.addFont('OpenHuninn.ttf', 'OpenHuninn', 'normal');
                    doc.setFont('OpenHuninn');

                    const margin = 20; const pageWidth = 210; const pageHeight = 297; const contentWidth = pageWidth - margin * 2;
                    let cursorY = margin;

                    // 輔助函式：確保中文長句子能正確換行
                    const addText = (text, fontSize, extraSpacing = 0, color = [0, 0, 0]) => {
                        doc.setFontSize(fontSize);
                        doc.setTextColor(color[0], color[1], color[2]);
                        
                        // 中文缺乏空格，jsPDF 無法自動斷行，我們手動將過長的行先粗略切斷
                        let processedText = "";
                        const maxChars = Math.floor(contentWidth / (fontSize * 0.35)); // 估算每行最大字數
                        
                        text.split('\n').forEach(line => {
                            if (line.length > maxChars) {
                                for (let i = 0; i < line.length; i += maxChars) {
                                    processedText += line.substring(i, i + maxChars) + '\n';
                                }
                            } else {
                                processedText += line + '\n';
                            }
                        });

                        const lines = doc.splitTextToSize(processedText.trim(), contentWidth);
                        
                        for (let i = 0; i < lines.length; i++) {
                            if (cursorY > pageHeight - margin) { doc.addPage(); cursorY = margin + 5; }
                            doc.text(lines[i], margin, cursorY);
                            cursorY += (fontSize * 0.4);
                        }
                        cursorY += extraSpacing;
                    };

                    const successfulItems = results.filter(r => r.status === 'success');

                    addText('JW 字幕批次提取報告', 22, 10, [30, 41, 59]);
                    addText(`影片目錄 (${successfulItems.length})`, 16, 6, [15, 23, 42]);
                    successfulItems.forEach((item, idx) => {
                        addText(`影片 ${idx + 1}: ${item.title}`, 12, 3, [71, 85, 105]);
                    });
                    cursorY += 10;

                    successfulItems.forEach((item, idx) => {
                        if (idx > 0) { doc.addPage(); cursorY = margin + 5; }
                        addText(`影片 ${idx + 1}: ${item.title}`, 18, 8, [30, 41, 59]);
                        addText(item.text, 11, 8, [50, 50, 50]);
                    });

                    doc.save(`JW字幕批次提取_${new Date().toISOString().slice(0,10)}.pdf`);

                } catch (error) {
                    setPdfError(error.message);
                } finally {
                    setIsGeneratingPdf(false);
                }
            };

            const renderInputScreen = () => (
                <div className="flex-1 flex flex-col items-center justify-center p-6 animate-fade-in">
                    <div className="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
                        <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                            <div className="p-3 bg-emerald-100 text-emerald-600 rounded-xl"><Icons.List /></div>
                            <div>
                                <h2 className="text-xl font-bold text-slate-800">批次影片輸入</h2>
                                <p className="text-sm text-slate-500">請貼上影片網址，每行一個 (最多 50 個)</p>
                            </div>
                        </div>
                        <textarea
                            className="w-full h-64 p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none resize-none font-mono text-sm whitespace-pre"
                            placeholder="https://...\nhttps://..."
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                        />
                        <button
                            onClick={handleStartBatch}
                            disabled={!inputText.trim()}
                            className="mt-6 w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg shadow-emerald-200"
                        >
                            <Icons.Play className="w-5 h-5 fill-current" />開始批次提取
                        </button>
                    </div>
                </div>
            );

            const renderProcessingScreen = () => {
                const percent = progress.total === 0 ? 0 : Math.round((progress.current / progress.total) * 100);
                return (
                    <div className="flex-1 flex flex-col items-center p-6 animate-fade-in bg-slate-50">
                        <div className="w-full max-w-3xl bg-white p-8 rounded-2xl shadow-md border border-slate-100 mb-6 mt-10">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-3 mb-6">
                                <Icons.Loader2 className="animate-spin text-emerald-500" />處理中... {percent}%
                            </h2>
                            <div className="w-full bg-slate-100 rounded-full h-4 mb-2"><div className="bg-emerald-500 h-4 rounded-full progress-bar-striped animate-stripes" style={{ width: `${percent}%` }}></div></div>
                        </div>
                    </div>
                );
            };

            const renderResultScreen = () => {
                const combinedText = getCombinedText();
                return (
                    <div className="flex-1 flex flex-col h-full overflow-hidden bg-white animate-fade-in relative min-h-0">
                        <div className="bg-slate-50 p-3 border-b border-slate-200 flex flex-wrap gap-2 items-center shrink-0 z-10 px-4">
                            <button onClick={() => setAppState('input')} className="mr-2 flex items-center gap-1.5 px-3 py-1.5 bg-slate-200 text-slate-700 rounded-lg text-sm font-bold"><Icons.ArrowLeft className="w-4 h-4"/>返回修改</button>
                        </div>

                        <div className="flex-1 relative bg-white p-4 md:p-8 overflow-y-auto">
                            <pre className="w-full font-mono text-xs md:text-sm leading-relaxed text-slate-700 whitespace-pre-wrap break-words pb-32 max-w-4xl mx-auto">{combinedText}</pre>
                            
                            <div className="fixed bottom-6 right-6 flex flex-col gap-4 z-30">
                                <button onClick={generateVectorPdf} className="p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold bg-red-600 text-white hover:bg-red-700" title="直接下載 A4 向量 PDF">
                                    <Icons.Download />
                                </button>
                                <button onClick={downloadHtml} className="p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold bg-purple-600 text-white hover:bg-purple-700" title="下載精美網頁版 (HTML)">
                                    <Icons.Code />
                                </button>
                                <button onClick={downloadTxt} className="p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold bg-blue-600 text-white hover:bg-blue-700" title="下載純文字版 (TXT)">
                                    <Icons.FileText />
                                </button>
                                <button onClick={copyResult} className={`p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold ${copyState ? 'bg-emerald-600' : 'bg-slate-800'} text-white`} title="複製全部內容">
                                    {copyState ? <Icons.Check /> : <Icons.Clipboard />}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full w-full bg-white relative">
                    {/* PDF 生成時的全螢幕遮罩 */}
                    {isGeneratingPdf && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[100] flex flex-col items-center justify-center text-white backdrop-blur-sm transition-opacity duration-300">
                            <Icons.Loader2 className="animate-spin w-16 h-16 text-emerald-400 mb-6" />
                            <h2 className="text-2xl font-bold mb-2">正在繪製向量 PDF...</h2>
                            <p className="text-slate-300 text-sm">(需動態載入中文字型，約需 3~5 秒鐘，請稍候)</p>
                        </div>
                    )}
                    
                    {/* 錯誤提示視窗 */}
                    {pdfError && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
                                <div className="text-red-500 mb-4 flex justify-center"><Icons.AlertCircle className="w-16 h-16"/></div>
                                <h3 className="text-xl font-bold mb-3 text-slate-800">PDF 生成失敗</h3>
                                <p className="text-slate-600 mb-6 leading-relaxed">{pdfError}</p>
                                <button onClick={() => setPdfError(null)} className="px-6 py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl w-full transition-colors">我知道了</button>
                            </div>
                        </div>
                    )}

                    <div className="h-full flex flex-col w-full">
                        <div className="bg-slate-900 text-white p-4 shadow-lg shrink-0 z-50 flex justify-between items-center h-16">
                            <div className="flex items-center gap-3">
                                <div className="text-emerald-400 bg-slate-800 p-1.5 rounded-lg"><Icons.ShieldCheck /></div>
                                <div><h1 className="text-base md:text-lg font-bold">JW 字幕提取器 (純淨完整版)</h1></div>
                            </div>
                        </div>
                        {appState === 'input' && renderInputScreen()}
                        {appState === 'processing' && renderProcessingScreen()}
                        {appState === 'result' && renderResultScreen()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
