<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JW 字幕提取器 (V15 多連結與向量PDF版)</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- App Icon -->
    <link rel="apple-touch-icon" href="https://assetsnffrgf-a.akamaihd.net/assets/m/802013146/univ/art/802013146_univ_sqr_xl.jpg">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar (隱藏於列印時) */
        textarea::-webkit-scrollbar, div::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track, div::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb, div::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
        textarea::-webkit-scrollbar-thumb:hover, div::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: content-box; }
        
        /* Markdown Styles */
        .prose h2 { font-size: 1.2em; font-weight: bold; margin-bottom: 0.5em; color: #6b21a8; }
        .prose h3 { font-size: 1.1em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: #0f172a; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose li { margin-bottom: 0.3em; }
        .prose p { margin-bottom: 0.8em; line-height: 1.6; }
        .prose strong { color: #047857; font-weight: 700; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .progress-bar-striped {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
        }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }
        .animate-stripes { animation: progress-stripes 1s linear infinite; }

        /* ================= 列印專用 CSS ================= */
        @media print {
            /* 強制背景顏色與白紙黑字 */
            body, html { background-color: white !important; color: black !important; margin: 0; padding: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* 分頁控制 */
            .page-break { page-break-before: always; break-before: page; }
            .no-break { page-break-inside: avoid; break-inside: avoid; }
            
            /* 調整列印邊距 */
            @page { margin: 15mm 20mm; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        // -----------------------------------------------------------------
        //  🔐 管理員專區：請在此設定 API KEY
        // -----------------------------------------------------------------
        const ENCODED_KEYS = [
            "YOUR_API_KEY_HERE" 
        ];
        // -----------------------------------------------------------------

        const Icons = {
            ShieldCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Loader2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            Play: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="6 3 20 12 6 21 6 3"/></svg>,
            AlertTriangle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            FileText: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
            Check: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>,
            CheckCircle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            XCircle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>,
            Clipboard: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>,
            Sparkles: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 3v4"/><path d="M3 9h4"/></svg>,
            Brain: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
            Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            Globe: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>,
            ArrowLeft: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            List: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Printer: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
        };

        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://thingproxy.freeboard.io/fetch/' 
        ];

        const App = () => {
            const [appState, setAppState] = React.useState('input'); // 'input' | 'processing' | 'result'
            const [inputText, setInputText] = React.useState('');
            const [results, setResults] = React.useState([]); 
            const [progress, setProgress] = React.useState({ current: 0, total: 0, success: 0, failed: 0 });
            
            const [copyState, setCopyState] = React.useState(false);
            const [aiStatus, setAiStatus] = React.useState('idle'); 
            const [aiResult, setAiResult] = React.useState('');

            const decodeKey = (str) => {
                try { return str.startsWith('AIza') ? str : atob(str); } 
                catch (e) { return str; }
            };

            const parseUrlInfo = (inputUrl) => {
                try {
                    const info = { id: null, lang: 'CH' };
                    const u = new URL(inputUrl.startsWith('http') ? inputUrl : `https://${inputUrl}`);
                    if (u.searchParams.get('lank')) info.id = u.searchParams.get('lank');
                    if (u.searchParams.get('wtlocale')) info.lang = u.searchParams.get('wtlocale');
                    if (!info.id) {
                        const match = inputUrl.match(/(pub-[a-zA-Z0-9-_]+)/i);
                        if (match) info.id = match[1];
                    }
                    return info;
                } catch (e) {
                    return { id: null, lang: 'CH' };
                }
            };

            const cleanVttText = (vttContent) => {
                if (!vttContent) return '';
                const txt = document.createElement("textarea");
                const decode = (str) => { txt.innerHTML = str; return txt.value; };
                const lines = vttContent.split('\n');
                let resultLines = [];
                let currentTimestamp = '';
                
                for (let i = 0; i < lines.length; i++) {
                    let text = lines[i].trim();
                    if (!text) continue;
                    if (text.startsWith('WEBVTT') || text.startsWith('NOTE') || text.startsWith('STYLE')) continue;
                    if (/^\d+$/.test(text)) continue; 
                    if (text.includes('-->')) {
                        const timeMatch = text.match(/^(\d{2}:\d{2}:\d{2})/);
                        if (timeMatch) currentTimestamp = `[${timeMatch[1]}] `;
                        else currentTimestamp = '';
                        continue;
                    }
                    text = text.replace(/<\/?[^>]+(>|$)/g, "");
                    text = decode(text); 
                    resultLines.push(`${currentTimestamp}${text}`);
                }
                return resultLines.join('\n');
            };

            const fetchWithRetry = async (targetUrl) => {
                try {
                    const directRes = await fetch(targetUrl);
                    if (directRes.ok) return directRes;
                } catch (e) {}
                for (let proxy of PROXIES) {
                    try {
                        const res = await fetch(proxy + encodeURIComponent(targetUrl));
                        if (res.ok) return res;
                    } catch (e) { continue; }
                }
                throw new Error('無法連線');
            };

            const delay = (ms) => new Promise(res => setTimeout(res, ms));

            const handleStartBatch = async () => {
                const lines = inputText.split('\n').map(l => l.trim()).filter(l => l !== '');
                if (lines.length === 0) return;
                
                const urlsToProcess = lines.slice(0, 50);
                if (lines.length > 50) alert('已自動截斷至前 50 個網址。');

                const initialResults = urlsToProcess.map(url => ({ url, status: 'pending', id: parseUrlInfo(url).id || '未知ID' }));
                setResults(initialResults);
                setProgress({ current: 0, total: urlsToProcess.length, success: 0, failed: 0 });
                setAppState('processing');
                setAiStatus('idle');
                setAiResult('');

                let currentResults = [...initialResults];
                let successCount = 0;
                let failedCount = 0;

                for (let i = 0; i < urlsToProcess.length; i++) {
                    const url = urlsToProcess[i];
                    let itemResult = { ...currentResults[i] };

                    try {
                        const { id, lang } = parseUrlInfo(url);
                        if (!id) throw new Error('無法識別影片 ID');
                        itemResult.id = id;

                        const apiUrl = `https://b.jw-cdn.org/apis/mediator/v1/media-items/${lang}/${id}?clientType=www`;
                        const resJSON = await fetchWithRetry(apiUrl);
                        const data = await resJSON.json();
                        
                        const files = data.media?.[0]?.files || [];
                        itemResult.title = data.media?.[0]?.title || id;
                        
                        const subFile = files.find(f => f.label === 'subtitles' || f.subtitles?.url);
                        if (!subFile) throw new Error('此影片無字幕檔');

                        const vttUrl = subFile.subtitles?.url || subFile.url;
                        const resVTT = await fetchWithRetry(vttUrl);
                        const vttText = await resVTT.text();

                        itemResult.text = cleanVttText(vttText);
                        itemResult.status = 'success';
                        successCount++;
                    } catch (err) {
                        itemResult.status = 'error';
                        itemResult.errorMsg = err.message;
                        failedCount++;
                    }

                    currentResults[i] = itemResult;
                    setResults([...currentResults]);
                    setProgress({ current: i + 1, total: urlsToProcess.length, success: successCount, failed: failedCount });
                    
                    if (i < urlsToProcess.length - 1) await delay(300);
                }

                setAppState('result');
            };

            const resetApp = () => {
                setAppState('input');
                setInputText('');
            };

            const getCombinedText = () => {
                const successfulItems = results.filter(r => r.status === 'success');
                if (successfulItems.length === 0) return '沒有成功提取的字幕。';
                return successfulItems.map((item, index) => {
                    return `=========================================\n影片 ${index + 1}: ${item.title || item.id}\n=========================================\n\n${item.text}\n\n`;
                }).join('');
            };

            const copyResult = () => {
                const text = getCombinedText();
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyState(true);
                setTimeout(() => setCopyState(false), 2000);
            };

            const downloadTxt = () => {
                let content = `JW 字幕批次提取報告\n\n`;
                if (aiStatus === 'success' && aiResult) content += `========== ✨ AI 綜合分析 ==========\n\n${aiResult}\n\n=================================\n\n`;
                content += getCombinedText();

                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `JW字幕批次提取_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const downloadHtml = () => {
                const successfulItems = results.filter(r => r.status === 'success');
                if (successfulItems.length === 0) return;

                let aiSectionHtml = '';
                if (aiStatus === 'success' && aiResult) {
                    aiSectionHtml = `<div class="ai-box"><div class="ai-title">✨ AI 綜合分析報告</div><div class="ai-content">${marked.parse(aiResult)}</div></div>`;
                }

                let tocHtml = `<div class="toc-box"><h3>影片目錄 (${successfulItems.length})</h3><ul>`;
                successfulItems.forEach((item, idx) => { tocHtml += `<li><a href="#video-${idx}">影片 ${idx+1}: ${item.title}</a></li>`; });
                tocHtml += `</ul></div>`;

                let transcriptsHtml = '';
                successfulItems.forEach((item, idx) => {
                    const safeTranscript = item.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    transcriptsHtml += `<div class="video-section" id="video-${idx}"><h2>影片 ${idx+1}: ${item.title}</h2><div class="transcript">${safeTranscript}</div></div>`;
                });

                const htmlContent = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>JW 字幕批次提取報告</title><style>body { font-family: sans-serif; line-height: 1.8; color: #334; background: #f1f5f9; padding: 20px; }.container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }h1 { border-bottom: 2px solid #e2e8f0; padding-bottom: 16px; }.ai-box { background: #faf5ff; border: 1px solid #e9d5ff; padding: 24px; border-radius: 12px; margin-bottom: 32px; }.ai-title { color: #7e22ce; font-weight: bold; margin-bottom: 12px; }.toc-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 32px; }.video-section { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #cbd5e1; }.transcript { font-family: monospace; font-size: 14px; white-space: pre-wrap; background: #f8fafc; padding: 20px; border-radius: 8px; }</style></head><body><div class="container"><h1>JW 字幕批次提取報告</h1>${aiSectionHtml}${tocHtml}${transcriptsHtml}</div></body></html>`;

                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `JW字幕批次提取_${new Date().toISOString().slice(0,10)}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // 🌟 核心新功能：轉存真正的「向量 PDF」
            const printToVectorPdf = () => {
                const isReady = confirm(
                    "💡 系統即將開啟瀏覽器的【列印】視窗。\n\n" +
                    "👉 請將「目的地 / 印表機」更改為【另存為 PDF (Save as PDF)】\n\n" +
                    "這樣就能匯出完美不失真、文字可選取的向量 PDF 檔囉！"
                );
                
                if (!isReady) return;

                // 暫時修改網頁標題，讓 PDF 預設檔名變得好看
                const originalTitle = document.title;
                const dateStr = new Date().toISOString().slice(0,10);
                document.title = `JW字幕批次提取報告_${dateStr}`;
                
                setTimeout(() => {
                    window.print();
                    // 列印視窗關閉後恢復原狀
                    document.title = originalTitle;
                }, 100);
            };

            const callGemini = async (type) => {
                if (ENCODED_KEYS.length === 0 || ENCODED_KEYS[0] === "YOUR_API_KEY_HERE") {
                    setAiStatus('error'); setAiResult('未設定 API Key'); return;
                }
                const selectedKey = decodeKey(ENCODED_KEYS[Math.floor(Math.random() * ENCODED_KEYS.length)]);
                const fullText = getCombinedText();
                if (!fullText || fullText.length < 50) return;

                setAiStatus('loading'); setAiResult('');
                const context = fullText.substring(0, 80000); 

                let prompt = "";
                if (type === 'summary') prompt = `請根據以下多部影片字幕提供繁體中文「總體重點摘要」。找出共通主題，列3-5個重點。Markdown格式：\n${context}`;
                else if (type === 'quiz') prompt = `請根據以下多部影片字幕設計3-5個綜合思考問題。附思路，Markdown格式：\n${context}`;
                else if (type === 'action') prompt = `請根據以下多部影片總結3點具體生活應用建議。Markdown格式：\n${context}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${selectedKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    setAiResult(data.candidates?.[0]?.content?.parts?.[0]?.text || '');
                    setAiStatus('success');
                } catch (e) {
                    setAiStatus('error'); setAiResult(`分析失敗: ${e.message}`);
                }
            };

            // ================== RENDERERS ==================

            const renderInputScreen = () => (
                <div className="flex-1 flex flex-col items-center justify-center p-6 animate-fade-in print:hidden">
                    <div className="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
                        <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                            <div className="p-3 bg-emerald-100 text-emerald-600 rounded-xl"><Icons.List /></div>
                            <div>
                                <h2 className="text-xl font-bold text-slate-800">批次影片輸入</h2>
                                <p className="text-sm text-slate-500">請貼上影片網址，每行一個 (最多 50 個)</p>
                            </div>
                        </div>
                        <textarea
                            className="w-full h-64 p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none resize-none font-mono text-sm whitespace-pre"
                            placeholder="https://...\nhttps://..."
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                        />
                        <button
                            onClick={handleStartBatch}
                            disabled={!inputText.trim()}
                            className="mt-6 w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg shadow-emerald-200"
                        >
                            <Icons.Play className="w-5 h-5 fill-current" />開始批次提取
                        </button>
                    </div>
                </div>
            );

            const renderProcessingScreen = () => {
                const percent = progress.total === 0 ? 0 : Math.round((progress.current / progress.total) * 100);
                return (
                    <div className="flex-1 flex flex-col items-center p-6 animate-fade-in bg-slate-50 print:hidden">
                        <div className="w-full max-w-3xl bg-white p-8 rounded-2xl shadow-md border border-slate-100 mb-6">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-3 mb-6">
                                <Icons.Loader2 className="animate-spin text-emerald-500" />處理中... {percent}%
                            </h2>
                            <div className="w-full bg-slate-100 rounded-full h-4 mb-2"><div className="bg-emerald-500 h-4 rounded-full progress-bar-striped animate-stripes" style={{ width: `${percent}%` }}></div></div>
                        </div>
                    </div>
                );
            };

            const renderResultScreen = () => {
                const combinedText = getCombinedText();
                return (
                    <div className="flex-1 flex flex-col h-full overflow-hidden bg-white animate-fade-in relative min-h-0 print:hidden">
                        <div className="bg-slate-50 p-3 border-b border-slate-200 flex flex-wrap gap-2 items-center shrink-0 z-10 px-4">
                            <button onClick={resetApp} className="mr-2 flex items-center gap-1.5 px-3 py-1.5 bg-slate-200 text-slate-700 rounded-lg text-sm font-bold"><Icons.ArrowLeft className="w-4 h-4"/>返回</button>
                            <div className="px-2 flex items-center gap-2 font-bold text-sm"><Icons.Sparkles className="text-purple-500 w-5 h-5" />AI 分析</div>
                            <button onClick={() => callGemini('summary')} className="flex items-center gap-1 px-3 py-1.5 bg-purple-50 text-purple-700 rounded-lg text-sm">摘要</button>
                            <button onClick={() => callGemini('quiz')} className="flex items-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-700 rounded-lg text-sm">問題</button>
                        </div>

                        {aiStatus !== 'idle' && (
                            <div className="bg-white border-b border-purple-100 p-4 shadow-sm shrink-0 max-h-[40vh] overflow-y-auto relative z-20">
                                <button onClick={() => setAiStatus('idle')} className="absolute top-2 right-2 p-2"><Icons.X /></button>
                                {aiStatus === 'loading' && <div className="flex justify-center py-4 gap-3"><Icons.Loader2 className="animate-spin w-5 h-5 text-purple-600"/>分析中...</div>}
                                {aiStatus === 'success' && <div className="prose prose-sm max-w-none"><div dangerouslySetInnerHTML={{ __html: marked.parse(aiResult) }} /></div>}
                            </div>
                        )}

                        <div className="flex-1 relative bg-white p-4 md:p-8 overflow-y-auto">
                            <pre className="w-full font-mono text-sm md:text-base leading-relaxed text-slate-700 whitespace-pre-wrap break-words pb-32 max-w-4xl mx-auto">{combinedText}</pre>
                            
                            <div className="fixed bottom-6 right-6 flex flex-col gap-4 z-30">
                                {/* 新增：向量 PDF 下載按鈕 (紅色) */}
                                <button onClick={printToVectorPdf} className="p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold bg-red-600 text-white hover:bg-red-700" title="列印匯出 真向量 PDF"><Icons.Printer /></button>
                                <button onClick={downloadHtml} className="p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold bg-orange-600 text-white hover:bg-orange-700" title="下載精美 HTML"><Icons.Globe /></button>
                                <button onClick={downloadTxt} className="p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold bg-blue-600 text-white hover:bg-blue-700" title="下載 TXT"><Icons.FileText /></button>
                                <button onClick={copyResult} className={`p-4 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 flex items-center justify-center font-bold ${copyState ? 'bg-emerald-600' : 'bg-slate-800'} text-white`} title="複製內容">{copyState ? <Icons.Check /> : <Icons.Clipboard />}</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // 🌟 專屬於產生 PDF 的隱藏渲染區塊 (只有在呼叫 window.print 時才會被看見)
            const renderPrintOnlyReport = () => {
                const successfulItems = results.filter(r => r.status === 'success');
                if (successfulItems.length === 0) return null;

                return (
                    <div className="max-w-4xl mx-auto py-8">
                        <h1 className="text-3xl font-bold mb-6 border-b-2 border-slate-300 pb-4">JW 字幕批次提取報告</h1>
                        
                        {aiStatus === 'success' && aiResult && (
                            <div className="mb-8 p-6 bg-purple-50 border border-purple-200 rounded-lg no-break">
                                <h2 className="text-xl font-bold text-purple-800 mb-4">✨ AI 綜合分析報告</h2>
                                <div className="prose prose-sm max-w-none text-slate-800" dangerouslySetInnerHTML={{ __html: marked.parse(aiResult) }} />
                            </div>
                        )}

                        <div className="mb-8 no-break">
                            <h3 className="text-xl font-bold mb-4">影片目錄 ({successfulItems.length})</h3>
                            <ul className="list-disc pl-6 space-y-2">
                                {successfulItems.map((item, idx) => (
                                    <li key={idx}><span className="text-slate-800 font-medium">{`影片 ${idx + 1}: ${item.title}`}</span></li>
                                ))}
                            </ul>
                        </div>

                        {successfulItems.map((item, idx) => (
                            <div key={idx} className="mt-12 page-break">
                                <h2 className="text-2xl font-bold mb-6 text-slate-900 border-b border-slate-200 pb-2">{`影片 ${idx + 1}: ${item.title}`}</h2>
                                <pre className="font-mono text-[13px] whitespace-pre-wrap text-slate-800 leading-relaxed">
                                    {item.text}
                                </pre>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="h-full w-full bg-white relative">
                    
                    {/* ===== 正常螢幕畫面 (列印時會被 Tailwind 的 print:hidden 完全隱藏) ===== */}
                    <div className="h-full flex flex-col w-full print:hidden">
                        <div className="bg-slate-900 text-white p-4 shadow-lg shrink-0 z-50 flex justify-between items-center h-16">
                            <div className="flex items-center gap-3">
                                <div className="text-emerald-400 bg-slate-800 p-1.5 rounded-lg"><Icons.ShieldCheck /></div>
                                <div><h1 className="text-lg font-bold">JW 字幕提取器</h1><p className="text-[10px] text-emerald-400 opacity-80 hidden sm:block">V15 Batch & Vector PDF</p></div>
                            </div>
                        </div>
                        {appState === 'input' && renderInputScreen()}
                        {appState === 'processing' && renderProcessingScreen()}
                        {appState === 'result' && renderResultScreen()}
                    </div>

                    {/* ===== 專屬 PDF 列印排版區 (螢幕上隱藏，只在列印時顯示) ===== */}
                    <div className="hidden print:block w-full h-full bg-white text-black text-left px-8">
                        {appState === 'result' ? renderPrintOnlyReport() : null}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
